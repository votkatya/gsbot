<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Город Спорта — Начать игру</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background: #FFD33D;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #000;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 24px;
        }

        h1 {
            color: #FFD33D;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .desc {
            color: #fff;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 36px;
            opacity: 0.85;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.85; }

        .btn-telegram {
            background: #FFD33D;
            color: #000;
        }

        .btn-vk {
            background: #fff;
            color: #000;
        }

        .btn svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .footer {
            color: #fff;
            font-size: 12px;
            margin-top: 24px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/Лого.png" alt="Город Спорта" class="logo">

        <h1>Участвуй в игре<br>«Город Спорта»!</h1>
        <p class="desc">Выполняй задания, зарабатывай спорткоины и обменивай их на подарки</p>

        <a href="https://t.me/YOUR_BOT_USERNAME" class="btn btn-telegram">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.16 13.67l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.988.889z"/>

        <a href="https://vk.com/app YOUR_VK_APP_ID" class="btn btn-vk">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12.785 16.241s.288-.032.436-.194c.136-.148.132-.427.132-.427s-.02-1.304.587-1.496c.598-.19 1.365 1.26 2.179 1.815.615.422 1.082.33 1.082.33l2.175-.03s1.138-.071.598-1.121c-.044-.085-.314-.661-1.618-1.87-1.366-1.264-1.183-1.059.462-3.243.998-1.329 1.397-2.142 1.273-2.49-.12-.333-.854-.245-.854-.245l-2.447.015s-.181-.025-.315.056c-.132.08-.216.267-.216.267s-.387 1.028-.903 1.902c-1.088 1.84-1.524 1.938-1.701 1.824-.414-.267-.31-1.075-.31-1.648 0-1.793.272-2.54-.528-2.733-.265-.064-.46-.106-1.138-.113-.87-.009-1.606.003-2.022.207-.277.136-.491.44-.361.457.161.022.526.098.72.36.249.335.24 1.086.24 1.086s.143 2.11-.334 2.372c-.327.179-.777-.186-1.742-1.853-.494-.854-.868-1.8-.868-1.8s-.07-.181-.2-.278c-.157-.117-.376-.154-.376-.154l-2.322.015s-.348.01-.476.161c-.114.135-.009.414-.009.414s1.816 4.25 3.872 6.395c1.885 1.969 4.024 1.84 4.024 1.84h.97z"/>

            Открыть во ВКонтакте
        </a>

        <p class="footer">gsbot18.ru</p>
    </div>
</body>
</html>
